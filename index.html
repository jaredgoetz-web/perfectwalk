    <style>
      /* Splash screen while React loads */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: hsl(30 30% 97%);
      }
      #root:empty::after {
        content: "";
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 3px solid hsl(32 80% 50% / 0.15);
        border-top-color: hsl(32 80% 50%);
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

    <div id="root"></div>
